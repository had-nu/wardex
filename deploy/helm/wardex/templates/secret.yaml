{{- if .Values.acceptSecret.create }}
{{- if not .Values.acceptSecret.value }}
{{- fail "acceptSecret.value must be set (--set-string acceptSecret.value=<secret>). Never commit this value to source control." }}
{{- end }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "wardex.secretName" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "wardex.labels" . | nindent 4 }}
  annotations:
    helm.sh/resource-policy: keep
type: Opaque
stringData:
  {{ .Values.acceptSecret.key }}: {{ .Values.acceptSecret.value | quote }}
{{- end }}
