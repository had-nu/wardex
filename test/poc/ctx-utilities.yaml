# PROFILE: Utilities (NAICS 22) — Critical Infrastructure (NIS2 Art. 21)
# Internal network/OT, auth required, maximum criticality, low tolerance
release_gate:
  enabled: true
  risk_appetite: 0.015          # Extremely tight: protects legacy industrial systems
  warn_above: 0.010             # Immediate alert band
  asset_context:
    internet_facing: false      # Internal OT network (NIS2 segmented)
    requires_auth: true         # Requires operator credentials
    environment: "production"
    criticality: 1.5            # Critical national infrastructure (FIPS 199 High)
  compensating_controls: []     # Assuming baseline air-gap (accounted in Exposure)
acceptance_workflow:
  enabled: true
  signing_secret_env: "WARDEX_ACCEPT_SECRET"
