# PROFILE: SaaS (NAICS 51) — Internal Microservice (Non-regulated)
# Behind auth + load balancer, moderate criticality, compensating WAF
release_gate:
  enabled: true
  risk_appetite: 0.200          # Moderate tolerance to ship faster (FIPS 199 Moderate)
  warn_above: 0.120             # Pre-block warning band
  asset_context:
    internet_facing: true       # Accessible via internal/customer port
    requires_auth: true         # Requires service-to-service auth
    environment: "production"
    criticality: 1.0            # Core business logic (FIPS 199 Moderate)
  compensating_controls:
    - name: "WAF + Rate Limiting"
      effectiveness: 0.3        # 30% risk reduction
acceptance_workflow:
  enabled: true
  signing_secret_env: "WARDEX_ACCEPT_SECRET"
