# PROFILE: Health (NAICS 62) — Patient Records System (HIPAA/NIS2)
# Internet-facing for patient portal, auth required, maximum criticality, IDS compensation
release_gate:
  enabled: true
  risk_appetite: 0.080          # Strict: threshold derived from FIPS 199 High + NIS2
  warn_above: 0.050             # Pre-block warning band
  asset_context:
    internet_facing: true       # Patient portal is public
    requires_auth: true         # Requires patient/doctor credentials
    environment: "production"
    criticality: 1.5            # Protected health information (FIPS 199 High)
  compensating_controls:
    - name: "IDS/IPS with behavioral analysis"
      effectiveness: 0.2        # 20% risk reduction
acceptance_workflow:
  enabled: true
  signing_secret_env: "WARDEX_ACCEPT_SECRET"
