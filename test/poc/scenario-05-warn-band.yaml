# scenario-05-warn-band.yaml
# Demonstrates a vulnerability that exceeds warn_above (0.45) but is below risk_appetite (0.6).
# (Escala normalizada v4: CVSS/10. Valores anteriores: warn=4.5, block=6.0)
vulnerabilities:
  - cve_id: "CVE-2025-0043"   # Medium/High vulnerability
    cvss_base: 5.5            # Base Score
    epss_score: 0.8           # High probability of exploit
    component: "lib-legacy"
    reachable: true
