      ref: lms-completion-q1-2025
    - type: test_result
      ref: phishing-sim-march-2025-3.2pct-click

- id: DOC-PPL-002
  name: Pre-Employment Screening
  description: >
    Background checks completed for all hires in 2024-2025.
    Sterling platform used. Results stored in HR system.
  layer: implemented
  domains: [people]
  maturity: 3
  effectiveness: 0.80
  evidences:
