# implemented-controls.yaml
# Layer: implemented — controlos operacionalmente activos e evidenciados.
# Produzido por inventário manual ou ferramentas de normalização (ex: Bridgr).
#
# Cenário deliberado para teste:
#
# COBERTURA:
#   technological  → 5 controlos implementados (full overlap com documented)
#   physical       → 3 controlos implementados SEM documentação (shadow security)
#   organizational → 3 controlos implementados (gap: DOC-ORG-003 e DOC-ORG-005 não implementados)
#   people         → 2 controlos implementados (gap: DOC-PPL-003 e DOC-PPL-004 não implementados)
#
# POLICY GAP (paper security — documentado, não implementado):
#   DOC-ORG-003: Incident Management declarado, sem evidência operacional
#   DOC-ORG-005: BCP em draft, não operacional
#   DOC-PPL-003: Cláusulas contratuais sem verificação de enforcement
#   DOC-PPL-004: Processo disciplinar sem registo de aplicação
#
# SHADOW SECURITY (implementado sem política documentada):
#   IMPL-PHY-001: Data centre access logs activos, sem política formal
#   IMPL-PHY-002: CCTV operacional, sem procedimento documentado
#   IMPL-PHY-003: Controlo de visitantes por badge, sem registo formal

- id: DOC-ORG-001
  name: Information Security Policies
  description: >
    ISP v3.2 operationally enforced. Annual review completed 2025-01.
    Acknowledged by all staff via LMS.
  layer: implemented
  domains: [organizational]
  maturity: 4
  effectiveness: 0.85
  evidences:
    - type: log
      ref: lms-policy-acknowledgement-2025-01

- id: DOC-ORG-002
  name: Supplier and Third-Party Risk Management
  description: >
    Vendor assessments completed for 18 of 22 critical suppliers.
    Remaining 4 scheduled for Q2 2025.
  layer: implemented
  domains: [organizational]
  maturity: 3
  effectiveness: 0.70
  review_required: false
  evidences:
    - type: test_result
      ref: vendor-assessment-tracker-2025-q1

- id: DOC-ORG-004
  name: Risk Assessment and Treatment
  description: >
    Risk register updated Q1 2025. 43 risks assessed, 12 with active
    treatment plans in progress.
  layer: implemented
  domains: [organizational]
  maturity: 4
  effectiveness: 0.90
  evidences:
    - type: log
      ref: jira:risk-register-q1-2025-43-items

