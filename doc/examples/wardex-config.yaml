# Wardex Configuration Example (v1.9.2)
# ------------------------------------

# Release Gate Context
# This block defines how Wardex evaluates vulnerabilities.
release_gate:
  enabled: true
  risk_appetite: 0.20        # Normalized scale [0, 1.5]. Block if any risk > this.
  warn_above: 0.12           # Warning threshold.
  mode: "any"                # "any" (single vuln) | "aggregate" (sum of risks)
  asset_context:
    criticality: 0.8         # Business criticality weight
    internet_facing: true    # Exposure factor
    requires_auth: true      # Exposure factor
    environment: "production"
  compensating_controls:     # Global mitigations that reduce final risk score
    - type: "waf"
      effectiveness: 0.15
      justification: "Cloudflare WAF protecting the edge"

# Acceptance Configuration
# Used by 'wardex accept' for managing risk acceptances.
acceptance:
  signing_secret_file: "wardex-accept.key" # Only used if WARDEX_ACCEPT_SECRET is not set
  limits:
    max_acceptance_days: 90
    min_justification_chars: 20
    max_report_age_hours: 24
  banned_justification_phrases:
    - "legacy code"
    - "no time to fix"
    - "low priority"

# Reporting Settings
reporting:
  format: "markdown"         # markdown | json | csv
  output: "wardex-report.md" # Path to output file
  gate_log:
    path: "wardex-gate-audit.log"
    forward: ["syslog"]      # Optional destinations
    on_fail: "warn"          # "warn" | "block"

# Profiles (RBAC)
# Overrides risk appetite for specific actors in trusted environments.
profiles:
  emergency:
    risk_appetite: 0.50
    warn_above: 0.30
    allowed_actors:
      - "ciso@example.com"
      - "security-lead@example.com"
