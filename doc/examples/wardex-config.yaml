# Wardex Configuration Example for CI/CD
# Best practices for v1.7.2+

# Global Thresholds
thresholds:
  critical_vulnerabilities: 0
  high_vulnerabilities: 2
  
# Output Settings
output:
  format: "markdown"
  file: "wardex-report.md"
  roadmap_limit: 15

# Security Settings
security:
  # Enforce cryptographic trust for actors in CI
  enforce_actor_trust: true
  # Fallback risk for unknown vectors (Safe-path)
  fail_close_default: 1.0

# Release Gate Context
release_gate:
  enabled: true
  risk_appetite: 0.20        # Normalized scale [0, 1.5]
  warn_above: 0.12           # Warning threshold
  mode: any                  # "any" | "aggregate"
  asset_context:
    criticality: 0.8         # C(α)
    internet_facing: true    # E(α) input
    requires_auth: true      # E(α) input
