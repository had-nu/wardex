name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write
  id-token: write

jobs:
  goreleaser:
    name: GoReleaser
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: Install cosign
        uses: sigstore/cosign-installer@3b4ae738807427b7f4ad94a259a072db3f31c800 # v3.8.1

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@9e63d92eb1ed18cc28da94b1c3ae98f2bcdabb6b # v6
        with:
          distribution: goreleaser
          version: latest
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate native SBOM
        run: go run ./cmd/gen-sbom/ wardex-${{ github.ref_name }}.sbom.json

      - name: Upload SBOM
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: sbom
          path: wardex-*.sbom.json
