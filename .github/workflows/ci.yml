name: CI

on:
  push:
    branches: [main, master, dev]
  pull_request:
    branches: [main, master, dev]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Run tests & Generate Coverage
        run: go test -v -race -coverprofile=coverage.out ./pkg/analyzer/... ./pkg/catalog/... ./pkg/correlator/... ./pkg/duration/... ./pkg/ingestion/... ./pkg/releasegate/... ./pkg/report/... ./pkg/sboms/... ./pkg/scorer/... ./pkg/snapshot/...

      - name: Enforce Coverage Threshold
        run: |
          COVERAGE=$(go tool cover -func=coverage.out | grep total | grep -Eo '[0-9]+\.[0-9]+')
          echo "Current Test Coverage: $COVERAGE%"
          if (( $(echo "$COVERAGE < 69.0" | bc -l) )); then
            echo "::error::Coverage $COVERAGE% is below the required 69.0% threshold."
            exit 1
          fi

  lint:
    name: Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@1e7e51e771db61008b38414a730f564565cf7c20  # v9.2.0
        with:
          version: v2.11.4

  security:
    name: Security Scan
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0  # v7.0.0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c  # v6.4.0
        with:
          go-version: "1.26.x"
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@v1.1.4

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Install gosec
        run: go install github.com/securego/gosec/v2/cmd/gosec@v2.25.0

      - name: Run gosec
        run: gosec -exclude-dir=research ./...
