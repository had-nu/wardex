name: 'Wardex Release Gate'
description: >
  Risk-based release gate for CRA, NIS2, DORA and ISO 27001.
  Evaluates vulns against risk appetite and blocks deployments.
branding:
  icon: 'shield'
  color: 'purple'

# Workspace Confinement Contract (WRDX-HARDEN-002):
# Paths are resolved relative to GITHUB_WORKSPACE (/github/workspace).
# The container's WORKDIR is set to /github/workspace, so os.Getwd()
# returns the workspace root. Pathguard validation ensures all inputs
# and outputs stay within this directory.
inputs:
  evidence:
    description: >
      Vulnerability evidence file (YAML/JSON).
      Path is relative to GITHUB_WORKSPACE.
      Generate with: `wardex convert grype <file>` or `wardex convert sbom <file>`.
    required: true
  config:
    description: 'Path to wardex-config.yaml (relative to GITHUB_WORKSPACE).'
    default: 'wardex-config.yaml'
    required: false
  framework:
    description: 'Compliance framework: iso27001 | nis2 | dora | soc2.'
    default: 'iso27001'
    required: false
  output-format:
    description: 'Report format: markdown | json | csv | html.'
    default: 'markdown'
    required: false
  output-file:
    description: 'Path for the generated report (relative to GITHUB_WORKSPACE).'
    default: 'wardex-report.md'
    required: false
runs:
  using: 'docker'
  image: 'Dockerfile'
  args:
    - evaluate
    - --evidence
    - ${{ inputs.evidence }}
    - --config
    - ${{ inputs.config }}
    - --framework
    - ${{ inputs.framework }}
    - -o
    - ${{ inputs.output-format }}
    - --out-file
    - ${{ inputs.output-file }}
